<!DOCTYPE html>
<html>
<head>
    <title>Nouikat-3D</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: white;
            text-align: center;
        }

        header {
            padding: 30px 20px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 2px;
        }

        .subtitle {
            opacity: 0.7;
            margin-top: 10px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }

        .product {
            background: #151515;
            margin: 15px;
            padding: 15px;
            border-radius: 15px;
            width: 280px;

            box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .product:hover {
            transform: translateY(-8px);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        h2 {
            margin: 10px 0;
        }

        p {
            opacity: 0.7;
            font-size: 14px;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;

            background: linear-gradient(45deg, #ff4d4d, #ff0000);
            color: white;
            font-size: 16px;

            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            opacity: 0.5;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Nouikat-3D</h1>
        <div class="subtitle">3D-gedruckte Designs – minimal & einzigartig</div>
    </header>

    <div class="container">

        <!-- PRODUKT 1 -->
        <div class="product">
            <img src="DEIN-BILD1.jpg">
            <h2>Mini Car Model</h2>
            <p>Minimalistisches 3D Modell – perfekt für dein Setup.</p>
            <button onclick="window.open('https://www.willhaben.at/DEIN-LINK')">
                Auf Willhaben kaufen
            </button>
        </div>

        <!-- PRODUKT 2 -->
        <div class="product">
            <img src="DEIN-BILD2.jpg">
            <h2>Desk Gadget</h2>
            <p>Sauberes Design für deinen Schreibtisch.</p>
            <button onclick="window.open('https://www.willhaben.at/DEIN-LINK')">
                Jetzt ansehen
            </button>
        </div>

        <!-- PRODUKT 3 -->
        <div class="product">
            <img src="DEIN-BILD3.jpg">
            <h2>Custom Print</h2>
            <p>Individuell gedruckt – auf Anfrage möglich.</p>
            <button onclick="window.open('https://www.willhaben.at/DEIN-LINK')">
                Anfrage senden
            </button>
        </div>

    </div>

    <footer>
        © 2026 Nouikat-3D
    </footer>

</body>
</html>
